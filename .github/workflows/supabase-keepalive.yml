name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 0 * * *" # Toutes les jours à minuit UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -L -X GET "https://dlbsdqnaqwksbuzxszsf.supabase.co/rest/v1/sales_deals?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
