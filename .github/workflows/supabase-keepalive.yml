name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase keep_alive RPC
        run: |
          response=$(curl -sS -L \
            -X POST \
            "https://dlbsdqnaqwksbuzxszsf.supabase.co/rest/v1/rpc/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -w "\nHTTP_STATUS:%{http_code}")

          echo "$response"

          echo "$response" | grep "HTTP_STATUS:200" > /dev/null
