name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 0 */3 * *" # Toutes les 3 jours à minuit UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -L -X GET "https://dlbsdqnaqwksbuzxszsf.supabase.co/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
